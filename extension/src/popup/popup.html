<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      margin: 0;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px 0;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ccc;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    label {
      display: block;
      margin-bottom: 4px;
      font-size: 12px;
      color: #666;
    }
    input[type="text"] {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .switch {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #ccc;
      border-radius: 22px;
      transition: 0.2s;
    }
    .slider:before {
      content: "";
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }
    input:checked + .slider {
      background: #22c55e;
    }
    input:checked + .slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>
  <h1>Hood-link</h1>
  <div class="status">
    <div id="dot" class="dot disconnected"></div>
    <span id="status-text">Disconnected</span>
  </div>
  <label for="server-url">Server URL</label>
  <input type="text" id="server-url" value="ws://localhost:7878/bridge" />
  <div class="toggle">
    <span>Enabled</span>
    <label class="switch">
      <input type="checkbox" id="toggle-enabled" checked />
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
